<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banyan Brief</title>
  <meta name="theme-color" content="#0b1120">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Banyan Brief">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b1120;
      --surface: #121b2e;
      --border: #1d2d44;
      --accent: #e8a020;
      --accent-dim: rgba(232,160,32,0.12);
      --text: #dce6f5;
      --muted: #5a6a85;
      --input-bg: #0d1525;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      width: 100%;
      max-width: 400px;
    }

    header {
      text-align: center;
      margin-bottom: 28px;
    }

    .eyebrow {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.22em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .tail {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 0.06em;
    }

    .version {
      font-size: 10px;
      color: var(--muted);
      margin-top: 3px;
      opacity: 0.6;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field:last-of-type {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 11px 13px;
      color: var(--text);
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
      appearance: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="time"]::-webkit-calendar-picker-indicator {
      filter: invert(0.5) sepia(1) saturate(2) hue-rotate(10deg);
      opacity: 0.6;
      cursor: pointer;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      opacity: 0.4;
    }

    input::placeholder, textarea::placeholder {
      color: var(--muted);
    }

    textarea {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 11px 13px;
      color: var(--text);
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      resize: vertical;
      min-height: 80px;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 4px 0 20px;
    }

    button {
      width: 100%;
      background: var(--accent);
      color: #0b1120;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.01em;
      cursor: pointer;
      transition: opacity 0.12s, transform 0.1s;
      font-family: inherit;
    }

    button:hover { opacity: 0.92; }
    button:active { opacity: 0.8; transform: scale(0.99); }

    .preview-wrap {
      margin-top: 16px;
    }

    .preview-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .preview {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 14px;
      font-size: 13px;
      line-height: 1.65;
      color: #8a9ab8;
      white-space: pre-wrap;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="eyebrow">Flight Dispatch</div>
      <h1>Banyan Brief</h1>
      <div class="tail">N120KA</div>
      <div class="version">Version 2.2</div>
    </header>

    <div class="card">
      <form id="form">
        <div class="row">
          <div class="field">
            <label for="date">Date</label>
            <input type="date" id="date" required>
          </div>
          <div class="field">
            <label for="time">On-the-line time</label>
            <input type="time" id="time" required>
          </div>
        </div>
        <div class="field">
          <label for="fuel">Gallons negative</label>
          <input type="number" id="fuel" min="0" max="9999" placeholder="0" required>
        </div>
        <div class="field">
          <label for="catering">Catering <span style="font-weight:400;text-transform:none;letter-spacing:0;color:#3d4f6a">(optional)</span></label>
          <textarea id="catering" placeholder="Describe catering requirements…" rows="3"></textarea>
        </div>
        <div class="divider"></div>
        <button type="submit">Send Brief to Banyan</button>
      </form>

      <div class="preview-wrap">
        <div class="preview-label">Preview</div>
        <div class="preview" id="preview"></div>
      </div>
    </div>
  </div>

  <script>
    const TAIL = 'N120KA';
    const STORAGE_KEY = 'banyanBriefDraftV3';
    const VERSION = '2.2.0';

    const fields = {
      date: document.getElementById('date'),
      time: document.getElementById('time'),
      fuel: document.getElementById('fuel'),
      catering: document.getElementById('catering')
    };

    const pad = n => String(n).padStart(2, '0');

    function saveForm() {
      try {
        const data = {};
        Object.keys(fields).forEach(k => { data[k] = fields[k].value; });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      } catch (_) {}
    }

    function restoreForm() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
        if (!saved) return;
        Object.keys(fields).forEach(k => {
          if (saved[k] !== undefined) fields[k].value = saved[k];
        });
      } catch (_) {}
    }

    // Default to today, then let saved state override
    const now = new Date();
    fields.date.value = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}`;
    restoreForm();

    function greeting() {
      const h = new Date().getHours();
      if (h < 12) return 'morning';
      if (h < 18) return 'afternoon';
      return 'evening';
    }

    function formatDate(value) {
      if (!value) return '[date]';
      const [year, month, day] = value.split('-').map(Number);
      return new Date(year, month - 1, day).toLocaleDateString('en-US', {
        weekday: 'long',
        month: 'long',
        day: 'numeric'
      });
    }

    function formatTime(value) {
      if (!value) return '[time]';
      const [h, min] = value.split(':').map(Number);
      const ampm = h >= 12 ? 'PM' : 'AM';
      const h12 = h % 12 || 12;
      return `${h12}:${pad(min)} ${ampm}`;
    }

    function buildSubject() {
      return `${TAIL} – On the line ${formatDate(fields.date.value)}`;
    }

    function buildBody() {
      const fuel = fields.fuel.value === '' ? '[fuel]' : fields.fuel.value;
      const catering = fields.catering.value.trim();

      const lines = [
        `Good ${greeting()} on duty`,
        '',
        `Please have the aircraft on the line at ${formatTime(fields.time.value)} on ${formatDate(fields.date.value)}, with ${fuel} gallons negative.`
      ];

      if (catering) lines.push('', catering);

      lines.push('', 'Regards,', 'Tim Eames', '(561) 202-4974');
      return lines.join('\n');
    }

    function updatePreview() {
      document.getElementById('preview').textContent = buildBody();
    }

    Object.values(fields).forEach(el => {
      el.addEventListener('input', () => { updatePreview(); saveForm(); });
    });

    document.getElementById('form').addEventListener('reset', () => {
      setTimeout(() => fields.fuel.focus(), 0);
    });

    updatePreview();

    document.getElementById('form').addEventListener('submit', function(e) {
      e.preventDefault();
      window.location.href = `mailto:frontdesk@banyanair.com?subject=${encodeURIComponent(buildSubject())}&body=${encodeURIComponent(buildBody())}`;
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
